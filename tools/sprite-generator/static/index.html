<!doctype html><html lang="th"><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>DataXTown Sprite Generator</title>
<style>body{font:16px system-ui;background:#111827;color:#e5e7eb;max-width:760px;margin:40px auto;padding:20px}form{display:grid;gap:14px;background:#1f2937;padding:24px;border-radius:16px}label{display:grid;gap:6px}input,select,button{font:inherit;padding:10px;border-radius:8px;border:1px solid #4b5563}button{background:#7c3aed;color:white;font-weight:700;cursor:pointer}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}#status{white-space:pre-wrap}</style>
<h1>Portrait → Game Sprite</h1><p>อัปโหลดภาพบุคคล ระบบจะเรียกสร้างภาพ 1 ครั้ง แล้วทำ spritesheet, masks, frames และ GIF ภายในเครื่อง</p>
<form id="f"><label>รูปบุคคล<input type="file" name="photo" accept="image/png,image/jpeg,image/webp" required></label><div class="row"><label>ชื่อ asset<input name="name" placeholder="female-cto-v3" required></label><label>ตำแหน่ง<input name="role" placeholder="Chief Technology Officer"></label></div><div class="row"><label>เพศ/ลักษณะ<input name="gender" placeholder="female"></label><label>ชุด<input name="outfit" placeholder="black blazer, white blouse"></label></div><label><span><input type="checkbox" name="glasses" value="true"> ใส่แว่น</span></label><div class="row"><label>สีผม<input type="color" name="hair_color" value="#17171c"></label><label>สีเสื้อหลัก<input type="color" name="clothing_color" value="#1d1f24"></label></div><button>สร้าง Sprite</button><div id="status"></div></form>
<script>f.onsubmit=async e=>{e.preventDefault();status.textContent='กำลังสร้าง (อาจใช้เวลาหลายนาที)...';let r=await fetch('/api/generate',{method:'POST',body:new FormData(f)}),j=await r.json();if(!r.ok){status.textContent=j.detail||'Failed';return}status.innerHTML=`เสร็จแล้ว: <a style="color:#c4b5fd" href="${j.download}">ดาวน์โหลด ZIP</a>`}</script></html>
